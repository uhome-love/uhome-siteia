name: Deploy to Vercel (uhome.com.br)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.VITE_SUPABASE_URL }}" ]; then
            echo "❌ ERRO: Secret VITE_SUPABASE_URL não está configurado!"
            echo "Configure em: github.com/uhome-love/uhome-vision/settings/secrets/actions"
            exit 1
          fi
          if [ -z "${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}" ]; then
            echo "❌ ERRO: Secret VITE_SUPABASE_PUBLISHABLE_KEY não está configurado!"
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "❌ ERRO: Secret VERCEL_TOKEN não está configurado!"
            exit 1
          fi
          echo "✅ Todos os secrets validados"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Validate build output
        run: |
          # Garantir que o build gerou os arquivos necessários
          if [ ! -f "dist/index.html" ]; then
            echo "❌ ERRO: dist/index.html não foi gerado!"
            exit 1
          fi
          # Garantir que as env vars foram embutidas no bundle
          if ! grep -r "huigglwvvzuwwyqvpmec" dist/assets/ > /dev/null 2>&1; then
            echo "❌ ERRO CRÍTICO: Variáveis de ambiente do Supabase NÃO foram embutidas no bundle!"
            echo "O site ficaria branco. Deploy cancelado para proteger a produção."
            exit 1
          fi
          echo "✅ Build validado — env vars embutidas corretamente"
          echo "📦 Arquivos gerados:"
          ls -lah dist/assets/*.js | awk '{print $5, $9}'

      - name: Prepare Vercel Build Output structure
        run: |
          mkdir -p .vercel/output/static
          mkdir -p .vercel/output/functions/api/og-imovel.func

          # Copiar build do Vite para static/
          cp -r dist/. .vercel/output/static/

          # Copiar Edge Function
          cp api/og-imovel.js .vercel/output/functions/api/og-imovel.func/index.js

          # Configuração da Edge Function
          cat > .vercel/output/functions/api/og-imovel.func/.vc-config.json << 'EOF'
          {"runtime":"edge","entrypoint":"index.js"}
          EOF

          # Configuração de rotas
          cat > .vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "routes": [
              {
                "src": "^/assets/(.*)$",
                "headers": {
                  "cache-control": "public, max-age=31536000, immutable",
                  "access-control-allow-origin": "*"
                },
                "continue": true
              },
              {
                "src": "^/imovel/([^/]+)$",
                "dest": "/api/og-imovel",
                "headers": {
                  "cache-control": "no-store, no-cache",
                  "vary": "User-Agent"
                }
              },
              { "handle": "filesystem" },
              {
                "src": "^/(.*)$",
                "dest": "/index.html"
              }
            ]
          }
          EOF

          echo "✅ Estrutura Build Output API criada"

      - name: Deploy to Vercel via API (Build Output)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          pip install requests -q
          python3 << 'PYEOF'
          import requests, os, hashlib, time, datetime, json, sys

          TOKEN = os.environ["VERCEL_TOKEN"]
          TEAM_ID = os.environ["VERCEL_TEAM_ID"]
          OUTPUT_DIR = ".vercel/output"
          PROJECT_NAME = "uhome-proxy"

          headers_auth = {"Authorization": f"Bearer {TOKEN}"}

          # Coletar todos os arquivos
          files_to_upload = []
          for root, dirs, files in os.walk(OUTPUT_DIR):
              for fname in files:
                  fpath = os.path.join(root, fname)
                  rel_path = os.path.relpath(fpath, ".").replace("\\", "/")
                  files_to_upload.append((rel_path, fpath))

          print(f"Total arquivos: {len(files_to_upload)}")

          # Upload
          uploaded = []
          for rel_path, fpath in files_to_upload:
              with open(fpath, 'rb') as f:
                  content = f.read()
              sha1 = hashlib.sha1(content).hexdigest()
              r = requests.post(
                  f"https://api.vercel.com/v2/files?teamId={TEAM_ID}",
                  headers={**headers_auth, "Content-Type": "application/octet-stream",
                           "x-vercel-digest": sha1, "x-vercel-size": str(len(content))},
                  data=content, timeout=60
              )
              uploaded.append({"file": rel_path, "sha": sha1, "size": len(content)})

          print(f"Upload concluido: {len(uploaded)} arquivos")

          # Deploy
          r = requests.post(
              f"https://api.vercel.com/v13/deployments?teamId={TEAM_ID}&forceNew=1",
              headers={**headers_auth, "Content-Type": "application/json"},
              json={
                  "name": PROJECT_NAME,
                  "files": uploaded,
                  "projectSettings": {"framework": None, "buildCommand": None, "outputDirectory": None, "installCommand": None},
                  "target": "production",
              }, timeout=60
          )
          d = r.json()
          if "error" in d:
              print(f"ERRO: {d['error']}")
              sys.exit(1)

          deploy_id = d.get("id")
          print(f"Deploy iniciado: {deploy_id} | {d.get('readyState')}")

          # Aguardar READY
          for i in range(30):
              time.sleep(5)
              r2 = requests.get(f"https://api.vercel.com/v13/deployments/{deploy_id}?teamId={TEAM_ID}", headers=headers_auth, timeout=15)
              state = r2.json().get("readyState", "?")
              print(f"  [{datetime.datetime.now().strftime('%H:%M:%S')}] {state}")
              if state == "READY":
                  print("✅ Deploy concluido com sucesso!")
                  break
              elif state == "ERROR":
                  print(f"❌ ERRO no deploy: {r2.json().get('errorMessage', '')}")
                  sys.exit(1)
          PYEOF

      - name: Smoke test production
        run: |
          echo "Aguardando propagação..."
          sleep 15
          # Testar se o site está respondendo corretamente
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -A "Mozilla/5.0 Chrome/120" https://www.uhome.com.br/)
          if [ "$STATUS" != "200" ]; then
            echo "❌ ALERTA: Site retornou HTTP $STATUS após deploy!"
            exit 1
          fi
          # Testar se o bundle JS está acessível
          BUNDLE_URL=$(curl -s -A "Mozilla/5.0" https://www.uhome.com.br/ | grep -o '/assets/index-[^"]*\.js' | head -1)
          if [ -z "$BUNDLE_URL" ]; then
            echo "❌ ALERTA: Bundle JS não encontrado no HTML!"
            exit 1
          fi
          BUNDLE_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://www.uhome.com.br${BUNDLE_URL}")
          if [ "$BUNDLE_STATUS" != "200" ]; then
            echo "❌ ALERTA: Bundle JS retornou HTTP $BUNDLE_STATUS!"
            exit 1
          fi
          echo "✅ Smoke test passou — site funcionando em produção"
          echo "   HTTP: $STATUS | Bundle: $BUNDLE_URL ($BUNDLE_STATUS)"
